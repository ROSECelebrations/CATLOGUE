<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rose Celebrations | Luxurious Events & Soul-Satisfying Surprises</title>
    
    <!-- Resource Hints for Performance -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://images.pexels.com">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           APPLE-INSPIRED DESIGN SYSTEM & VARIABLES
           ========================================================================== */
        :root {
            --bg-base: #000000;
            --bg-elevated: #111111;
            --text-primary: #F5F5F7;
            --text-secondary: #86868B;
            
            --rose-light: #F4D5D9;
            --rose-gold: #D4A373;
            --rose-deep: #B76E79;
            
            --glass-bg: rgba(28, 28, 30, 0.5);
            --glass-bg-hover: rgba(44, 44, 46, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-strong: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            --blur-md: blur(20px) saturate(180%);
            
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
            --radius-pill: 9999px;
            
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            
            --transition-smooth: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            --transition-fast: all 0.3s ease;
            --wa-color: #25D366;
        }

        /* ==========================================================================
           GLOBAL RESETS & BASE TYPOGRAPHY
           ========================================================================== */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-stack);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.5;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(183, 110, 121, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(212, 163, 115, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            width: 100%;
        }

        h1, h2, h3, h4 { font-weight: 600; letter-spacing: -0.02em; }
        
        /* Gradients */
        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-rose {
            background: linear-gradient(135deg, var(--rose-light) 0%, var(--rose-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Typography Utilities */
        .section-header { 
            text-align: center; 
            margin: 0 auto 4rem; 
            width: 100%; 
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .section-title { font-size: 2.8rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.1; text-align: center; }
        .section-subtitle { font-size: 1.1rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto; line-height: 1.6; text-align: center;}
        @media (min-width: 768px) { .section-title { font-size: 4rem; } .section-subtitle { font-size: 1.2rem; } }

        /* ==========================================================================
           COMPONENTS & UTILITIES
           ========================================================================== */
        /* Image Loading Skeletons */
        .skeleton-bg {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 28px; border-radius: var(--radius-pill);
            font-size: 1rem; font-weight: 500; text-decoration: none;
            transition: var(--transition-smooth); cursor: pointer; border: none;
            text-align: center;
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.1); color: var(--text-primary);
            border: 1px solid var(--glass-border); backdrop-filter: var(--blur-md);
        }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.02); }
        .btn-primary { background: var(--text-primary); color: var(--bg-base); font-weight: 600; }
        .btn-primary:hover { transform: scale(1.02); background: var(--rose-light); }
        .btn-wa { background: var(--wa-color); color: white; font-weight: 600; width: 100%; max-width: 300px; margin: 0 auto; }
        .btn-wa:hover { background: #1ebd5a; transform: scale(1.03); box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }

        /* Floating Dynamic Island Navigation */
        nav {
            position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 900px; padding: 0.75rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: var(--radius-pill); z-index: 9999;
            background: rgba(20, 20, 22, 0.75);
            backdrop-filter: var(--blur-md); -webkit-backdrop-filter: var(--blur-md);
            border: 1px solid var(--glass-border);
            transition: var(--transition-smooth);
        }
        nav.scrolled {
            top: 0.75rem; width: 95%; max-width: 1000px;
            background: rgba(10, 10, 12, 0.9);
        }
        .logo { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;}
        .logo i { color: var(--rose-deep); font-size: 1.4rem; }
        
        .nav-links { display: flex; gap: 1.5rem; list-style: none; justify-content: center; align-items: center; margin-left: auto; margin-right: 2rem;}
        .nav-links a { 
            color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; 
            font-weight: 500; transition: var(--transition-fast); cursor: pointer;
            padding: 0.5rem 1rem; border-radius: var(--radius-pill); text-align: center;
        }
        .nav-links a:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: var(--bg-base); background: var(--text-primary); }
        
        .nav-actions { display: flex; align-items: center; gap: 1rem; justify-content: flex-end; }
        .mobile-menu-btn { display: none; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; padding: 5px; }

        /* Cart Icon */
        .cart-icon-wrapper { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); transition: var(--transition-fast); border: 1px solid var(--glass-border); }
        .cart-icon-wrapper:hover { background: rgba(255,255,255,0.15); color: var(--rose-light); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--rose-deep); color: white; font-size: 0.7rem; font-weight: 700; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid var(--bg-elevated); display: none; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .cart-badge.pop { transform: scale(1.3); background-color: var(--text-primary); color: var(--bg-base); }

        /* Toast Notification (UX Improvement) */
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(40, 40, 40, 0.95); color: white; padding: 12px 24px;
            border-radius: var(--radius-pill); font-size: 0.95rem; font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--glass-border);
            z-index: 10000; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast i { color: var(--wa-color); }

        /* Premium Fullscreen Mobile Menu */
        .mobile-menu {
            position: fixed; inset: 0; 
            background: rgba(10, 10, 12, 0.75);
            backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
            z-index: 9998; display: flex; flex-direction: column; align-items: center; 
            padding: 6rem 5% 3rem;
            opacity: 0; pointer-events: none; transition: opacity 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .mobile-menu.active { opacity: 1; pointer-events: all; }
        
        .mobile-menu-links {
            display: flex; flex-direction: column; gap: 0.8rem; width: 100%; max-width: 320px; margin: auto 0;
        }
        
        .mobile-menu .menu-item {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-pill);
            padding: 0.8rem 1.4rem;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transform: translateY(15px) scale(0.98); opacity: 0;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .mobile-menu.active .menu-item { transform: translateY(0) scale(1); opacity: 1; }
        .mobile-menu.active .menu-item:nth-child(1) { transition-delay: 0.05s; }
        .mobile-menu.active .menu-item:nth-child(2) { transition-delay: 0.1s; }
        .mobile-menu.active .menu-item:nth-child(3) { transition-delay: 0.15s; }
        .mobile-menu.active .menu-item:nth-child(4) { transition-delay: 0.2s; }
        .mobile-menu.active .menu-item:nth-child(5) { transition-delay: 0.25s; }

        .mobile-menu.active .menu-item.active, 
        .mobile-menu.active .menu-item:hover {
            background: var(--text-primary); color: var(--bg-base);
            transform: translateY(0) scale(1.02); border-color: transparent; font-weight: 600;
        }
        
        .menu-item i { opacity: 0.5; font-size: 0.9rem; transition: var(--transition-fast); }
        .menu-item.active i, .menu-item:hover i { opacity: 1; color: var(--bg-base); }

        .mobile-wa-pill {
            width: 100%; max-width: 320px;
            background: rgba(37, 211, 102, 0.15); 
            border: 1px solid rgba(37, 211, 102, 0.3);
            color: var(--wa-color); 
            padding: 0.9rem; 
            border-radius: var(--radius-pill);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 1rem; font-weight: 600; text-decoration: none;
            transform: translateY(15px); opacity: 0; 
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .mobile-menu.active .mobile-wa-pill { transform: translateY(0); opacity: 1; transition-delay: 0.35s; }

        /* Location Badge Style */
        .location-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: var(--radius-pill);
            background: rgba(183, 110, 121, 0.15); border: 1px solid rgba(183, 110, 121, 0.3);
            color: var(--rose-light); font-size: 0.85rem; font-weight: 500;
            letter-spacing: 1px; text-transform: uppercase; margin-bottom: 1.5rem;
        }

        /* ==========================================================================
           CART DRAWER
           ========================================================================== */
        .cart-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: 10000; opacity: 0; pointer-events: none; transition: var(--transition-smooth);
        }
        .cart-overlay.active { opacity: 1; pointer-events: all; }

        .cart-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh;
            background: rgba(20, 20, 22, 0.95); backdrop-filter: var(--blur-md); -webkit-backdrop-filter: var(--blur-md);
            border-left: 1px solid var(--glass-border); z-index: 10001; transition: right 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; padding: 2rem;
        }
        .cart-drawer.active { right: 0; }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; }
        .cart-header h2 { font-size: 1.8rem; font-weight: 600; }
        .close-cart { background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; transition: var(--transition-fast); width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); }
        .close-cart:hover { background: rgba(255,255,255,0.15); transform: rotate(90deg); color: var(--rose-light); }

        .cart-items { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; padding-right: 10px; }
        .cart-items::-webkit-scrollbar { width: 6px; }
        .cart-items::-webkit-scrollbar-thumb { background: var(--glass-border-strong); border-radius: 10px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 1rem; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); }
        .cart-item-info h4 { font-size: 1rem; margin-bottom: 8px; color: var(--text-primary); }
        .cart-item-controls { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: var(--radius-pill); width: fit-content; border: 1px solid var(--glass-border); }
        .cart-item-controls button { background: none; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; width: 24px; transition: color 0.2s; }
        .cart-item-controls button:hover { color: var(--rose-light); }
        .cart-item-remove { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); color: #ff4d4d; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition-fast); }
        .cart-item-remove:hover { background: rgba(255,0,0,0.2); transform: scale(1.1); }

        .cart-footer { margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem; }
        
        /* ==========================================================================
           SPA ROUTING & PAGE LAYOUT
           ========================================================================== */
        main { flex: 1; position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .page-view {
            display: none; opacity: 0; 
            width: 100%; max-width: 1400px;
            padding: 8rem 5% 4rem;
            animation: viewFadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            flex-direction: column;
            align-items: center;
        }
        .page-view.active { display: flex; }
        @keyframes viewFadeIn { from { opacity: 0; transform: translateY(15px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* ==========================================================================
           HOME PAGE
           ========================================================================== */
        #page-home { padding-top: 0; max-width: 100%; width: 100%; }
        .hero {
            height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: relative; padding: 0 5%;
        }
        .hero-bg {
            position: absolute; inset: 0; z-index: -1; width: 100%; height: 100%;
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }
        /* Optimized fetchpriority for hero image */
        .hero-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transform: scale(1.05); animation: slowPan 30s linear infinite alternate;}
        @keyframes slowPan { from { transform: scale(1.05) translateY(0); } to { transform: scale(1.1) translateY(-2%); } }
        
        .hero-content { position: relative; z-index: 10; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }
        .hero-title { font-size: 3.5rem; font-weight: 700; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; text-align: center; }
        @media (min-width: 768px) { .hero-title { font-size: 6.5rem; } }
        .hero-desc { font-size: 1.1rem; color: var(--text-secondary); max-width: 700px; margin: 0 auto 3rem; line-height: 1.6; font-weight: 400; text-align: center;}
        .hero-buttons { display: flex; gap: 1rem; justify-content: center; align-items: center; flex-wrap: wrap; width: 100%; }

        /* Highlight Grid (Home) */
        .highlight-grid {
            display: grid; grid-template-columns: 1fr; gap: 2rem; 
            width: 100%; max-width: 1000px; 
            margin: -10vh auto 0; padding: 0 5% 6rem; position: relative; z-index: 20;
            justify-items: center;
        }
        @media (min-width: 768px) { .highlight-grid { grid-template-columns: repeat(2, 1fr); margin-top: -15vh; } }
        
        .bento-card {
            width: 100%; max-width: 450px;
            border-radius: var(--radius-lg); position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            aspect-ratio: 1; transition: var(--transition-smooth); cursor: pointer;
            border: 1px solid var(--glass-border);
        }
        @media (min-width: 768px) { .bento-card { aspect-ratio: 4/3; } }
        .bento-card:hover { transform: translateY(-8px); border-color: var(--glass-border-strong); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .bento-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .bento-card:hover img { transform: scale(1.05);
