<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSE | Bespoke Orchestration</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #D4AF37; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; }
        
        /* Glass Navbar */
        header { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: min(90%, 600px); padding: 12px 24px; z-index: 100;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 99px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Hero */
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 10vw, 6rem); font-weight: 300; margin-bottom: 1rem; }
        
        /* Bento Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 90%; max-width: 1100px; margin: 0 auto; }
        .card { padding: 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; }
        
        .btn { padding: 12px 30px; border-radius: 99px; background: var(--text); color: #000; border: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 700; letter-spacing: 2px;">ROSE</div>
        <button class="btn" onclick="openWA()">Concierge</button>
    </header>

    <section class="hero">
        <h1>Bespoke Moments.</h1>
        <p>Luxury event orchestration and curated gifting.</p>
    </section>

    <section class="grid">
        <div class="card">
            <h3>Confections</h3>
            <p>Grain-free, milk-based artistry with gold leaf.</p>
        </div>
        <div class="card">
            <h3>Surprise Events</h3>
            <p>Masterful, invisible orchestration.</p>
        </div>
        <div class="card">
            <h3>Photography</h3>
            <p>Candid narratives, from beach to reveal.</p>
        </div>
    </section>

    <script>
        function openWA() {
            window.open('https://wa.me/918247553115?text=Hello ROSE, I would like to inquire about your services.');
        }
    </script>
</body>
</html>
