<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROSE | Bespoke Celebrations</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #070709;
            --text-primary: #F5F5F7;
            --text-secondary: #9E9E9E;
            --accent-gold: #D4AF37;
            --glass-bg: rgba(25, 25, 28, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { background-color: var(--bg-base); color: var(--text-primary); margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Dynamic Island Navigation */
        .nav-island {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            height: 60px; width: 300px;
            background: rgba(25, 25, 28, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 9999;
            overflow: hidden;
        }
        
        .nav-island.expanded { 
            width: 400px; height: 300px; 
            border-radius: 40px; 
            flex-direction: column; 
            padding: 40px;
            transform: translateX(-50%) scale(1.02);
        }
        
        .nav-content { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; letter-spacing: 0.15em; cursor: pointer; color: var(--text-primary); }
        
        .menu-items { 
            display: none; flex-direction: column; gap: 25px; margin-top: 30px; text-align: center;
            opacity: 0; transition: opacity 0.4s ease 0.3s;
        }
        .nav-island.expanded .menu-items { display: flex; opacity: 1; }
        .nav-island.expanded .nav-content { display: none; }

        .menu-items a { 
            text-decoration: none; color: var(--text-primary); 
            font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300;
        }

        /* Content Sections */
        section { padding: 120px 10%; text-align: center; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; font-weight: 300; letter-spacing: 0.02em; }
        p { color: var(--text-secondary); margin-top: 20px; font-weight: 300; font-size: 1.1rem; }
    </style>
</head>
<body>

    <nav class="nav-island" id="navIsland">
        <div class="nav-content">
            <span class="logo">ROSE</span>
            <i class="fa-solid fa-bars" id="menuToggle" style="cursor: pointer; font-size: 1.2rem;"></i>
        </div>
        <div class="menu-items">
            <a href="#featured">Featured Excellence</a>
            <a href="#return-gifts">Return Gifts</a>
            <a href="#events">Special Events</a>
            <a href="#portfolio">Past Orchestrations</a>
        </div>
    </nav>

    <section id="hero">
        <h1>Pure Luxury. Pure Rose.</h1>
        <p>Bespoke gifting and event orchestration for the discerning.</p>
    </section>

    <script>
        const nav = document.getElementById('navIsland');
        const toggle = document.getElementById('menuToggle');
        
        toggle.addEventListener('click', () => {
            nav.classList.toggle('expanded');
            toggle.className = nav.classList.contains('expanded') ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
        });

        // Close menu when clicking a link
        document.querySelectorAll('.menu-items a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('expanded');
                toggle.className = 'fa-solid fa-bars';
            });
        });
    </script>
</body>
</html>
