<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rose Celebrations | Events & Premium Gifts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Apple Dark Mode OS Palette with Rose Gold Accents */
            --bg-base: #000000;
            --bg-surface: #1c1c1e;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            
            /* Rose Celebrations Branding */
            --accent-color: #e0a3ad; /* Rose Gold / Soft Pink */
            --accent-light: #f4d5d9;
            --accent-dark: #b86b77;
            
            /* Apple OS Glassmorphism */
            --glass-bg: rgba(30, 30, 30, 0.45);
            --glass-bg-hover: rgba(50, 50, 50, 0.55);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-light: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --blur-heavy: blur(30px) saturate(200%);
            --blur-light: blur(15px) saturate(150%);
            
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
            
            --transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            
            /* Apple Native Typography */
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            
            /* WhatsApp Color */
            --wa-color: #25D366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow-x: hidden;
            /* Subtle rose-tinted mesh background */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(224, 163, 173, 0.08), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.03), transparent 25%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Typography */
        h1, h2, h3, h4 { font-weight: 600; letter-spacing: -0.02em; }
        .section-title { 
            font-size: 2.5rem; 
            text-align: center; 
            margin-bottom: 3rem; 
            font-weight: 700;
        }
        @media (min-width: 768px) { .section-title { font-size: 3.5rem; margin-bottom: 4rem; } }
        
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-accent {
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glass Utility */
        .os-glass {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-heavy);
            -webkit-backdrop-filter: var(--blur-heavy);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 28px; border-radius: 999px;
            font-size: 0.95rem; font-weight: 500; text-decoration: none;
            transition: var(--transition); border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-primary);
            backdrop-filter: var(--blur-light);
            cursor: pointer;
        }
        .btn:hover { background: var(--glass-bg-hover); transform: scale(1.02); border-color: var(--glass-border-light); }
        .btn-primary { background: var(--text-primary); color: var(--bg-base); border: none; }
        .btn-primary:hover { background: var(--accent-color); color: var(--bg-base); }
        .btn-wa { background: var(--wa-color); color: white; border: none; font-weight: 600; }
        .btn-wa:hover { background: #1ebd5a; color: white; transform: scale(1.03); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); }

        /* Navigation */
        nav {
            position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1000px; padding: 0.8rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 100px; z-index: 2000;
            transition: var(--transition);
        }
        nav.scrolled {
            top: 0.5rem; width: 95%; padding: 0.6rem 1.5rem;
            background: rgba(20, 20, 20, 0.8); border-color: rgba(255,255,255,0.15);
        }
        .logo { 
            font-size: 1.4rem; font-weight: 700; color: var(--text-primary); 
            text-decoration: none; letter-spacing: 2px; display: flex; align-items: center; gap: 8px;
        }
        .logo i { color: var(--accent-color); }
        
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { 
            color: var(--text-primary); text-decoration: none; font-size: 0.9rem; 
            font-weight: 500; transition: color 0.3s; cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }
        
        .mobile-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; padding: 5px; cursor: pointer; }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed; inset: 0; background: var(--glass-bg);
            backdrop-filter: var(--blur-heavy); -webkit-backdrop-filter: var(--blur-heavy);
            z-index: 1900; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: var(--transition); gap: 2rem;
        }
        .mobile-menu.active { opacity: 1; pointer-events: all; }
        .mobile-menu a { font-size: 1.5rem; font-weight: 600; color: var(--text-primary); text-decoration: none; transition: color 0.3s; }
        .mobile-menu a:hover, .mobile-menu a.active { color: var(--accent-color); }

        /* Page Routing System (SPA) */
        main { flex: 1; position: relative; }
        .page {
            display: none;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
            padding: 8rem 5% 4rem;
            min-height: 100vh;
        }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Hero Section (Home) */
        .hero {
            height: calc(100vh - 8rem);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: relative;
        }
        .hero-img {
            position: absolute; inset: 0; z-index: -1; border-radius: var(--radius-lg); overflow: hidden;
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            -webkit-mask-image: linear
